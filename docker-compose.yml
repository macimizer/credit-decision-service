version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit-decision-service-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16.4-alpine3.20
    container_name: credit-decision-service-postgres
    environment:
      POSTGRES_DB: credit_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credit_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4.2-alpine3.20
    container_name: credit-decision-service-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

volumes:
  postgres_data:
