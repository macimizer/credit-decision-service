name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_DB: credit_service
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d credit_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4
        ports:
          - 6379:6379

    env:
      POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/credit_service?sslmode=disable
      TEST_DATABASE_DSN: postgres://postgres:postgres@localhost:5432/credit_service?sslmode=disable
      REDIS_ADDR: localhost:6379
      RUN_INTEGRATION_TESTS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=3m

      - name: Run unit tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Run integration tests
        run: go test ./... -tags=integration -count=1

      - name: Build
        run: CGO_ENABLED=0 go build ./cmd/api
